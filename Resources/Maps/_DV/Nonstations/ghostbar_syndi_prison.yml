      content: >-
        Warden,


        You have been granted command of Facility 882, a clandestine, maximum-security Syndicate site. Your directive is absolute: maintain the health and physical integrity of every prisoner under your watch.


        We have provided you with several high-value Nanotrasen assets. These individuals are vital leverage; however, they are only useful to us if they remain alive and cooperative. Consequently, Facility 882 has been equipped with amenities far beyond our standard protocols. Should any captive become a liability, we trust your discretion to act—but be warned: if that trust is squandered, your tenure will end along with your life.


        This facility is under total communications blackout, save for the secure line in your office. Use it sparingly. Every transmission is a beacon that could betray our location to the enemy.


        High Command

        Agent Omega
