    - type: Paper
      content: >-
        This is our final testament—the last words we will ever write. The end has finally found us.


        We discovered a flaw in the mountain’s heart, accessible through the freezer, but the progress was agonizingly slow. It took years of chipping away in the dark just to reach this point. Then, the earth gave way. A cave-in caught us as we moved through the passage, leaving both my comrade and me broken amidst the rubble.


        We have no supplies left. The air is thinning with every breath, and we no longer possess the strength to shift the stones that entomb us. Perhaps, after all the years we have spent in this place, this is the only mercy we were ever going to receive.
