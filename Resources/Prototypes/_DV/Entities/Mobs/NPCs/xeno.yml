# GhostTakeover

# Snakes
- type: entity
  parent: MobPurpleSnake
  id: MobPurpleSnakeGhost
  suffix: Player
  components:
  - type: GhostTakeoverAvailable
  - type: GhostRole
    allowMovement: true
    allowSpeech: false
    makeSentient: true
    name: salvage snake
    description: You are a salvage snake hunting for a meal.
    rules: deltav-ghost-role-information-salvageantag-rules
    mindRoles:
      - MindRoleGhostRoleSoloAntagonist
  - type: SalvageMobRestrictions

- type: entity
  parent: MobSmallPurpleSnake
  id: MobSmallPurpleSnakeGhost
  suffix: Player, Small
  components:
  - type: GhostTakeoverAvailable
  - type: GhostRole
    allowMovement: true
    allowSpeech: false
    makeSentient: true
    name: salvage snake
    description: You are a salvage snake hunting for a meal.
    rules: deltav-ghost-role-information-salvageantag-rules
    mindRoles:
      - MindRoleGhostRoleSoloAntagonist
  - type: SalvageMobRestrictions

# Variants of Xenos to allow ghost takeover again

- type: entity
  abstract: true
  id: BaseMobXenoPlayer
  suffix: Player
  components:
  - type: GhostRole
    allowMovement: true
    allowSpeech: true
    makeSentient: true
    name: ghost-role-information-xeno-name
    description: ghost-role-information-xeno-description
    rules: ghost-role-information-xeno-rules
    mindRoles:
      - MindRoleGhostRoleTeamAntagonist
    raffle:
      settings: short
  - type: GhostTakeoverAvailable

- type: entity
  parent: [BaseMobXenoPlayer, MobXeno] # Reverse order so suffix works
  id: MobXenoPlayer
  name: Burrower

