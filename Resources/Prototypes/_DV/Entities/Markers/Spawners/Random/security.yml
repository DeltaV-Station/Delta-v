- type: entity
  id: LootSpawnerSecuritySuperweapon
  name: security superweapon spawner
  suffix: superweapon
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: _DV/Objects/Weapons/Guns/Battery/beam_devestator.rsi
      state: base
  - type: EntityTableSpawner
    table: !type:NestedSelector
      tableId: RandomSuperweaponTable

- type: entity
  id: LootSpawnerSecurityAdvancedweapons
  name: security Advanced weapons spawner
  suffix: Advancedweapons
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: _DV/Objects/Weapons/Guns/Battery/beam_devestator.rsi
      state: base
  - type: EntityTableSpawner
    table: !type:NestedSelector
      tableId: AdvancedWeaponTable

#Table
- type: entityTable
  id: RandomSuperweaponTable
  table: !type:GroupSelector
    children:
    - !type:NestedSelector
      tableId: RPGTable
    - !type:NestedSelector
      tableId: GamblagatorTable

- type: entityTable
  id: AdvancedWeaponTable
  table: !type:GroupSelector
    children:
    - !type:NestedSelector
      tableId: AdvancedLaserTable

- type: entityTable
  id: RPGTable
  table: !type:AllSelector
    children:
    - id: WeaponLauncherRocket
    - id: CartridgeRocket
      prob: 0.2

- type: entityTable
  id: GamblagatorTable
  table: !type:AllSelector
    children:
    - id: WeaponSniperGamblagator
    - id: GamblagatorCapacitor
      amount: !type:ConstantNumberSelector
        value: 4

- type: entityTable
  id: NT3Table
  table: !type:AllSelector
    children:
    - id: WeaponLightMachinegGunNT3
    - id: BlueprintMagazineBoxLMGAntiMateriel
    - id: MagazineLMGAntiMaterielBox
      amount: !type:ConstantNumberSelector
        value: 2

- type: entityTable
  id: AdvancedLaserTable
  table: !type:AllSelector
    children:
    - id: WeaponColdCannon
    - id: WeaponTemperatureGun
    - id: PortableRecharger
    - id: WeaponLaserCannon
      amount: !type:ConstantNumberSelector
        value: 2
    - id: WeaponBeamCannon
      prob: 0.4
    - id: WeaponXrayCannon
      prob: 0.4
    - id: WeaponImmolator
      prob: 0.3
    - id: PortableRecharger
      prob: 0.2
    - id: WeaponEnergyGunMini
      prob: 0.1
