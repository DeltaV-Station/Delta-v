# We need to copy paste the entire thing because we don't want Electrified component on that thang.
- type: entity
  name: lightning
  id: PsionicLightning
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: /Textures/Effects/lightning.rsi
    drawdepth: Effects
    layers:
    - state: "lightning_1"
      shader: unshaded
  - type: Physics
    canCollide: false
  - type: Lightning
  - type: PointLight
    enabled: true
    color: "#4080FF"
    radius: 3.5
    softness: 1
    autoRot: true
    castShadows: false
  - type: Beam
    sound: /Audio/Effects/Lightning/lightningshock.ogg
  - type: TimedDespawn
    lifetime: 3
  - type: Tag
    tags:
    - HideContextMenu
