  name: Technokinetic Pulse
  description: Unleash a burst of Technokinetic energy, disabling or destroying nearby electronics.
  components:
  - type: Action
    icon: { sprite: _DV/Actions/technokineticpulse.rsi, state: technokinetic-pulse }
    useDelay: 60
  - type: InstantAction
    event: !type:TechnokineticPulseActionEvent
