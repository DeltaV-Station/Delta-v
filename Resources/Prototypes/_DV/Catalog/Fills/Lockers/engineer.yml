    children:
    - id: ClothingOuterVoidsuitEngineering
    - id: OxygenTankFilled
    - id: ClothingShoesBootsMag
    - id: ClothingMaskBreath

# Undetermined Engineering Suit Table
- type: entityTable
  id: FillEngineerUndetermined
  table: !type:AllSelector
    children:
    - id: UndeterminedsuitEngineer
    - id: OxygenTankFilled
    - id: ClothingShoesBootsMag
    - id: ClothingMaskBreath
