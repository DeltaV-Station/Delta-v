# Engineering Void Suit Locker
- type: entity
  id: LockerEngineerFilledVoidsuit
  suffix: Filled, Void suit
  parent: LockerEngineerFilled
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - !type:NestedSelector
          tableId: FillLockerEngineer
        - !type:NestedSelector
          tableId: FillEngineerVoidsuit

# Undetermined Engineering Suit Locker
- type: entity
  id: LockerEngineerFilledSelector
  suffix: Filled, Undetermined
  parent: LockerEngineerFilled
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - !type:NestedSelector
          tableId: FillLockerEngineer
        - !type:NestedSelector
          tableId: FillEngineerUndetermined

# Engineering Void Suit Table
- type: entityTable
  id: FillEngineerVoidsuit
