- type: entity
  id: BaseReactorPart
  parent: BaseItem
  categories: [ HideSpawnMenu ]
  components:
  - type: ReactorPart
  - type: Sprite
    sprite: _FarHorizons/Structures/Power/Generation/FissionGenerator/reactor_parts.rsi
    state: default_rod
  - type: Item
    size: Huge
  - type: MultiHandedItem
  - type: Tag
    tags:
    - ReactorPart
  - type: GuideHelp
    guides:
    - NuclearReactor
    - Power

# Fuel Rods
- type: entity
  id: BaseReactorFuelRod
  parent: [ BaseReactorPart, BaseEngineeringContraband ]
  categories: [ HideSpawnMenu ]
  name: fuel rod
  description: A fuel rod for a nuclear reactor.
  components:
  - type: ReactorPart
    rodType: 1
    iconStateInserted: "fuel"
    iconStateCap: "fuel_cap"
    neutronCrossSection: 1.0
    thermalCrossSection: 10
    thermalMass: 420000 # specific heat capacity of steel (420 J/KgK) * mass of component (1000Kg)
  - type: Edible # Blame Abby for making them edible
    transferAmount: null
    delay: 30
    forceFeedDelay: 60
  - type: FlavorProfile
    flavors:
      - metal
      - electrons
  - type: BadFood
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: Uranium
          Quantity: 800
        - ReagentId: Radium
          Quantity: 200
        canReact: false
  - type: StealTarget
    stealGroup: ReactorFuelRodSteal
  - type: SentienceTarget
    flavorKind: station-event-random-sentience-flavor-inanimate
    weight: 0.2

- type: entity
  id: CerenkiteReactorFuelRod
  parent: BaseReactorFuelRod
  name: cerenkite fuel rod # These are your basic, semi-harmless fuel rods
  components:
  - type: ReactorPart
    material: Cerenkite

- type: entity
  id: UraniumReactorFuelRod
  parent: BaseReactorFuelRod
  name: uranium fuel rod
  components:
  - type: ReactorPart
    material: Uranium

- type: entity
  id: PlutoniumReactorFuelRod
  parent: BaseReactorFuelRod
  name: plutonium fuel rod
  components:
  - type: ReactorPart
    material: Plutonium
  - type: GhostRole
    makeSentient: true
    allowSpeech: true
    allowMovement: false
    name: ghost-role-information-plutonium-rod-name
    description: ghost-role-information-plutonium-rod-description
    rules: ghost-role-information-plutonium-rod-rules
    mindRoles:
    - MindRoleGhostRoleFreeAgentHarmless
  - type: GhostTakeoverAvailable
  - type: SentienceTarget
    weight: 2

- type: entity
  id: BananiumReactorFuelRod
  parent: BaseReactorFuelRod
  name: bananium fuel rod
  description: A honk rod for a nuclear reactor.
  components:
  - type: ReactorPart
    material: Bananium

- type: entity
  id: PlasmaReactorFuelRod
  parent: BaseReactorFuelRod
  name: plasma fuel rod
  components:
  - type: ReactorPart
    material: Plasma

- type: entity
  id: UraniumGlassReactorFuelRod
  parent: BaseReactorFuelRod
  name: uranium glass fuel rod
  components:
  - type: ReactorPart
    material: UraniumGlass

- type: entity
  id: MeatReactorFuelRod
  parent: BaseReactorFuelRod
  name: meat fuel rod
  description: A fuel rod fo- wait, is it alive?
  components:
  - type: ReactorPart
    material: Meaterial
    properties:
      electrical: 4
      hard: 1
      density: 3
      flammable: 3
      radioactive: 5

