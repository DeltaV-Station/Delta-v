- type: markingPoints
  id: MobShadekinMarkingLimits
  onlyWhitelisted: false
  points:
    Hair:
      points: 1
      required: false
    FacialHair:
      points: 1
      required: false
    Tail:
      points: 1
      required: true
      defaultMarkings: [ ShadekinTail ]
    HeadTop:
      points: 1
      required: true
      defaultMarkings: [ ShadekinEar ]
    Head:
      points: 3
      required: false
    Snout:
      points: 1
      required: false
    Chest:
      points: 3
      required: false
    Legs:
      points: 6
      required: false
    Arms:
      points: 6
      required: false

