- type: entity
  save: false
  name: Urist McShade
  parent: BaseMobShadekin
  id: MobShadekin
  components:
    - type: CombatMode
    - type: InteractionPopup
      successChance: 1
      interactSuccessString: hugging-success-generic
      interactSuccessSound: /Audio/Effects/thudswoosh.ogg
      messagePerceivedByOthers: hugging-success-generic-others
    - type: MindContainer
      showExamineInfo: true
    - type: Input
      context: "human"
    - type: MobMover
    - type: InputMover
    - type: Alerts
    - type: Eye
    - type: CameraRecoil
    - type: Examiner
    - type: CanHostGuardian
    - type: NpcFactionMember
      factions:
        - NanoTrasen
    # Nova - Shadekin don't breathe, but keep respirator with 0 damage so the system doesn't error
    - type: Respirator
      damage:
       types:
        Asphyxiation: 0
      damageRecovery:
        types:
          Asphyxiation: -1.0
    # Nova - No breathing requirement
    - type: BreathingImmunity
