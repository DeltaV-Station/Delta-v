- type: constructionGraph
  id:   N14Seat
  start: start
  graph:
    - node: start
      actions:
        - !type:DestroyEntity {}
      edges:
        - to: N14ChairArmchair
          steps:
            - material: WoodPlank
              amount: 2
              doAfter: 1
            - material: Cloth
              amount: 1
        - to: N14ChairErgonomic # DeltaV
          steps:
            - material: Steel
              amount: 2
              doAfter: 1
            - material: Cloth
              amount: 1
        - to: N14ChairRetro # Begin DeltaV Additions
          steps:
          - material: Steel
            amount: 3
            doAfter: 1
          - material: Cloth
            amount: 1
            doAfter: 1 

    - node: N14ChairRetro
      entity: N14ChairBarRetro
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SheetSteel1
              amount: 3
            - !type:SpawnPrototype
              prototype: MaterialCloth1
              amount: 1
          steps:
            - tool: Screwing
              doAfter: 1 # End DeltaV Additions

    - node: N14ChairArmchair
      entity: N14ChairArmchair
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: MaterialWoodPlank1
              amount: 2
            - !type:SpawnPrototype
              prototype: MaterialCloth1
              amount: 1
          steps:
            - tool: Screwing
              doAfter: 1

    - node: N14ChairErgonomic # DeltaV
      entity: N14ChairOfficeErgonomic
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SheetSteel1
              amount: 2
            - !type:SpawnPrototype
              prototype: MaterialCloth1
              amount: 1
          steps:
            - tool: Screwing
              doAfter: 1
