- type: entity
  name: breaching hammer
  parent: BaseItem
  id: SecBreachingHammer
  description: A large, heavy hammer with a long handle, used for breaking stones or other heavy material such as the skulls of violent criminals, also perfect for forcing your way through airlocks.
  components:
  - type: Sprite
    sprite: Nyanotrasen/Objects/Weapons/Melee/breaching_hammer.rsi
    state: icon
  - type: Item
    size: Ginormous
  - type: MeleeWeapon
    attackRate: 0.6
    range: 1.70
    wideAnimationRotation: -135
    damage:
      types:
        Blunt: 10
        Piercing: 3
        Structural: 10
    soundHit:
      path: /Audio/Nyanotrasen/Weapons/club.ogg
    bluntStaminaDamageFactor: 1.6 # 40 stamina damage wielded
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 25
        Piercing: 2
        Structural: 30
  - type: ThrowingAngle
    angle: 225
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 10
  - type: Tool
    qualities:
      - Prying
  - type: Prying
    speedModifier: 1.5
    pryPowered: !type:Bool
      true
    force: !type:Bool
      true
    useSound: /Audio/Items/jaws_pry.ogg
  - type: Clothing
    sprite: Nyanotrasen/Objects/Weapons/Melee/breaching_hammer.rsi
    quickEquip: false
    slots:
    - back


